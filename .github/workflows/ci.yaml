name: Build, Push, and Bump GitOps
 
on:
  push:
    branches: [ master ]
 
permissions:
  contents: read
  packages: write
 
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_map: ${{ steps.collect.outputs.changed_map }}
      changed_services: ${{ steps.collect.outputs.changed_services }}
      has_changes: ${{ steps.collect.outputs.has_changes }}
      sha_short: ${{ steps.collect.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Detect changed service paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            customer_management:
              - 'src/Services/EcommerceDDD.CustomerManagement/**'
              - 'src/Core/**'
              - 'src/Crosscutting/EcommerceDDD.ServiceClients/**'
            product_catalog:
              - 'src/Services/EcommerceDDD.ProductCatalog/**'
              - 'src/Core/**'
            inventory_management:
              - 'src/Services/EcommerceDDD.InventoryManagement/**'
              - 'src/Core/**'
              - 'src/Crosscutting/EcommerceDDD.ServiceClients/**'
            quote_management:
              - 'src/Services/EcommerceDDD.QuoteManagement/**'
              - 'src/Core/**'
              - 'src/Crosscutting/EcommerceDDD.ServiceClients/**'
            order_processing:
              - 'src/Services/EcommerceDDD.OrderProcessing/**'
              - 'src/Core/**'
              - 'src/Crosscutting/EcommerceDDD.ServiceClients/**'
            payment_processing:
              - 'src/Services/EcommerceDDD.PaymentProcessing/**'
              - 'src/Core/**'
              - 'src/Crosscutting/EcommerceDDD.ServiceClients/**'
            shipment_processing:
              - 'src/Services/EcommerceDDD.ShipmentProcessing/**'
              - 'src/Core/**'
              - 'src/Crosscutting/EcommerceDDD.ServiceClients/**'
            identityserver:
              - 'src/Crosscutting/EcommerceDDD.IdentityServer/**'
              - 'src/Core/**'
            apigateway:
              - 'src/Crosscutting/EcommerceDDD.ApiGateway/**'
            signalr:
              - 'src/Crosscutting/EcommerceDDD.SignalR/**'
              - 'src/Core/**'
            spa:
              - 'src/EcommerceDDD.Spa/**'
 
      - name: Collect change outputs
        id: collect
        shell: bash
        env:
          APIGATEWAY: ${{ steps.filter.outputs.apigateway }}
          IDENTITYSERVER: ${{ steps.filter.outputs.identityserver }}
          SIGNALR: ${{ steps.filter.outputs.signalr }}
          CUSTOMER_MANAGEMENT: ${{ steps.filter.outputs.customer_management }}
          PRODUCT_CATALOG: ${{ steps.filter.outputs.product_catalog }}
          INVENTORY_MANAGEMENT: ${{ steps.filter.outputs.inventory_management }}
          QUOTE_MANAGEMENT: ${{ steps.filter.outputs.quote_management }}
          ORDER_PROCESSING: ${{ steps.filter.outputs.order_processing }}
          PAYMENT_PROCESSING: ${{ steps.filter.outputs.payment_processing }}
          SHIPMENT_PROCESSING: ${{ steps.filter.outputs.shipment_processing }}
          SPA: ${{ steps.filter.outputs.spa }}
        run: |
          set -euo pipefail
 
          changed_services=()
          [[ "$APIGATEWAY" == "true" ]] && changed_services+=("\"apigateway\"")
          [[ "$IDENTITYSERVER" == "true" ]] && changed_services+=("\"identityserver\"")
          [[ "$SIGNALR" == "true" ]] && changed_services+=("\"signalr\"")
          [[ "$CUSTOMER_MANAGEMENT" == "true" ]] && changed_services+=("\"customer-management\"")
          [[ "$PRODUCT_CATALOG" == "true" ]] && changed_services+=("\"product-catalog\"")
          [[ "$INVENTORY_MANAGEMENT" == "true" ]] && changed_services+=("\"inventory-management\"")
          [[ "$QUOTE_MANAGEMENT" == "true" ]] && changed_services+=("\"quote-management\"")
          [[ "$ORDER_PROCESSING" == "true" ]] && changed_services+=("\"order-processing\"")
          [[ "$PAYMENT_PROCESSING" == "true" ]] && changed_services+=("\"payment-processing\"")
          [[ "$SHIPMENT_PROCESSING" == "true" ]] && changed_services+=("\"shipment-processing\"")
          [[ "$SPA" == "true" ]] && changed_services+=("\"spa\"")
 
          if [ ${#changed_services[@]} -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_services=[]" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_services=[$(IFS=,; echo "${changed_services[*]}")]" >> "$GITHUB_OUTPUT"
          fi
 
          cat >> "$GITHUB_OUTPUT" <<EOF
          changed_map={"apigateway":$APIGATEWAY,"identityserver":$IDENTITYSERVER,"signalr":$SIGNALR,"customer-management":$CUSTOMER_MANAGEMENT,"product-catalog":$PRODUCT_CATALOG,"inventory-management":$INVENTORY_MANAGEMENT,"quote-management":$QUOTE_MANAGEMENT,"order-processing":$ORDER_PROCESSING,"payment-processing":$PAYMENT_PROCESSING,"shipment-processing":$SHIPMENT_PROCESSING,"spa":$SPA}
          EOF
 
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
 
  build-push:
    runs-on: ubuntu-latest
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: apigateway
            dockerfile: src/Crosscutting/EcommerceDDD.ApiGateway/Dockerfile
          - service: identityserver
            dockerfile: src/Crosscutting/EcommerceDDD.IdentityServer/Dockerfile
          - service: signalr
            dockerfile: src/Crosscutting/EcommerceDDD.SignalR/Dockerfile
          - service: customer-management
            dockerfile: src/Services/EcommerceDDD.CustomerManagement/Dockerfile
          - service: product-catalog
            dockerfile: src/Services/EcommerceDDD.ProductCatalog/Dockerfile
          - service: inventory-management
            dockerfile: src/Services/EcommerceDDD.InventoryManagement/Dockerfile
          - service: quote-management
            dockerfile: src/Services/EcommerceDDD.QuoteManagement/Dockerfile
          - service: order-processing
            dockerfile: src/Services/EcommerceDDD.OrderProcessing/Dockerfile
          - service: payment-processing
            dockerfile: src/Services/EcommerceDDD.PaymentProcessing/Dockerfile
          - service: shipment-processing
            dockerfile: src/Services/EcommerceDDD.ShipmentProcessing/Dockerfile
          - service: spa
            dockerfile: src/EcommerceDDD.Spa/Dockerfile
    if: needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - if: contains(needs.detect-changes.outputs.changed_services, format('"{0}"', matrix.service))
        uses: actions/checkout@v4
 
      - name: Set up Docker Buildx
        if: contains(needs.detect-changes.outputs.changed_services, format('"{0}"', matrix.service))
        uses: docker/setup-buildx-action@v3
 
      - name: Log in to GHCR
        if: contains(needs.detect-changes.outputs.changed_services, format('"{0}"', matrix.service))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
 
      - name: Build and push ${{ matrix.service }}
        if: contains(needs.detect-changes.outputs.changed_services, format('"{0}"', matrix.service))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ecommerceddd-${{ matrix.service }}:sha-${{ needs.detect-changes.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
 
  bump-gitops:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-push]
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' && needs.build-push.result == 'success' }}
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/EcommerceDDD-gitops
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: gitops
          ref: main
 
      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.6.0"
 
      - name: Bump changed service image tags
        shell: bash
        env:
          CHANGED_SERVICES_JSON: ${{ needs.detect-changes.outputs.changed_services }}
          SHA_SHORT: ${{ needs.detect-changes.outputs.sha_short }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
 
          OWNER_LC=$(echo "$GHCR_OWNER" | tr '[:upper:]' '[:lower:]')
          cd gitops/apps/overlays/dev
 
          for service in $(echo "$CHANGED_SERVICES_JSON" | jq -r '.[]'); do
            image="ghcr.io/${OWNER_LC}/ecommerceddd-${service}"
            kustomize edit set image "${image}=${image}:sha-${SHA_SHORT}"
          done
 
      - name: Create PR to GitOps main
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITOPS_REPO_PAT }}
          path: gitops
          commit-message: "chore(dev): bump images to sha-${{ needs.detect-changes.outputs.sha_short }} [skip ci]"
          title: "chore(dev): bump images to sha-${{ needs.detect-changes.outputs.sha_short }}"
          body: |
            Automated image tag bump from app CI.
 
            - Source repo: ${{ github.repository }}
            - Source commit: ${{ github.sha }}
            - New tag: sha-${{ needs.detect-changes.outputs.sha_short }}
            - Services: ${{ needs.detect-changes.outputs.changed_services }}
          branch: ci/bump-gitops-sha-${{ needs.detect-changes.outputs.sha_short }}
          base: main
          delete-branch: true
          add-paths: |
            apps/overlays/dev/kustomization.yaml
 